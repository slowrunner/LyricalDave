launch:

  # ---------------------------------------------------------------------
  # Speech-to-text server (voskros). The Hello Dave lifecycle node will
  # retry /stt/set_grammar until this is ready (~10s typical startup).
  # ---------------------------------------------------------------------
  - include:
      file: $(find-pkg-share voskros)/launch/voskros.launch.yaml

  # ---------------------------------------------------------------------
  # Text-to-speech server
  # ---------------------------------------------------------------------
  - node:
      pkg: say_node_pkg
      exec: say_node
      name: say

  # ---------------------------------------------------------------------
  # Battery state publisher (whatever node publishes /battery_state)
  # ---------------------------------------------------------------------
  - node:
      pkg: dave_interfaces_pkg
      exec: battery_state_node
      name: battery_monitor

  # ---------------------------------------------------------------------
  # Hello Dave dialog BT lifecycle node
  # ---------------------------------------------------------------------
  - node:
      pkg: bt_hello_dave
      exec: hello_dave_lifecycle_node
      name: hello_dave_bt
      parameters:
        - grammar_yaml: /home/ubuntu/LyricalDave/ros2ws/params/bt_hello_dave_grammar.yaml
        - bt_xml: /home/ubuntu/LyricalDave/ros2ws/params/bt_hello_dave_tree.xml
        - heard_log_path: /home/ubuntu/LyricalDave/logs/heard.log
        - tick_period_ms: 100
