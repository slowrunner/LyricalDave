profile:
- educational
behavior:
  type: sequence
  on_error: abort_and_report
  steps:
  - measure:
      what: distance
      sensor: distance
      store_as: measured_distance
  - wait_for:
      condition:
        sensor_threshold:
          op: gt
          value: 30
          sensor: distance
  - speak:
      utterance: Wait completed - proceed with exploration
